<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<!--
  Check & Repair dialog (v2.8). A self-contained window that runs
  Zotero.WatchFolder.reconcile.detect() on load, lists each inconsistency with a
  plain-English explanation + a recommended action (overridable), and applies
  only the selected fixes via reconcile.applyRepairs(). Items with annotations
  or notes float to the top with a gold badge and are never defaulted to a
  destructive action. Opened via window.openDialog from preferences.js.
-->
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
  <title>Watch Folder — Check &amp; Repair</title>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="chrome://global/skin/global.css"/>
  <script src="chrome://zotero-watch-folder/content/reconcileDialog.js"/>
  <style type="text/css"><![CDATA[
    /* Pin colors explicitly (global.css ships dark defaults on some Linux DEs). */
    html, body { background: #ffffff; color: #1a1a1a; font: message-box;
      font-size: 13px; margin: 0; padding: 0; }
    .wrap { padding: 16px 18px 14px 18px; min-width: 620px; max-width: 820px; }
    h2 { font-size: 17px; margin: 0 0 2px 0; color: #111; }
    .sub { color: #555; font-size: 12.5px; margin: 0 0 12px 0; line-height: 1.45; }
    .sub b { color: #8a6d00; }
    #list { max-height: 460px; overflow-y: auto; padding-right: 4px; }
    .empty { padding: 28px 8px; text-align: center; color: #2e7d32; font-size: 15px; }
    .card { border: 1px solid #e2e2e2; border-radius: 7px; padding: 10px 12px;
      margin-bottom: 9px; background: #fbfbfb; }
    .card.high { border-color: #e7c200; background: #fffdf2; }
    .row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
    .dot.high { background: #d94f00; } .dot.medium { background: #c79100; } .dot.low { background: #888; }
    .title { font-weight: 600; color: #161616; }
    .badge { margin-left: auto; background: #ffe79a; color: #6b5200; border: 1px solid #e7c200;
      border-radius: 10px; padding: 1px 9px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
    .detail { color: #333; font-size: 12.5px; line-height: 1.5; margin: 1px 0 6px 0; }
    .path { color: #666; font-size: 11.5px; font-family: monospace; margin-bottom: 7px; word-break: break-all; }
    .act { display: flex; align-items: center; gap: 8px; }
    .act label { color: #555; font-size: 12px; }
    select { font-size: 12.5px; padding: 2px 4px; }
    .destructive { color: #b00020; }
    .footer { display: flex; align-items: center; gap: 10px; margin-top: 12px;
      border-top: 1px solid #ececec; padding-top: 12px; }
    .status { color: #555; font-size: 12.5px; margin-right: auto; }
    button { font-size: 13px; padding: 5px 14px; border-radius: 5px; border: 1px solid #bcbcbc; background: #f3f3f3; color: #111; }
    button.primary { background: #2b6cb0; border-color: #245a94; color: #fff; font-weight: 600; }
    button[disabled] { opacity: 0.5; }
    #error { color: #b00020; font-size: 12.5px; margin: 8px 0; }
  ]]></style>
</head>
<body>
  <div class="wrap">
    <h2>Check &amp; Repair</h2>
    <p id="subtitle" class="sub">Scanning for inconsistencies between your watch folder and Zotero…</p>
    <div id="error"></div>
    <div id="empty" class="empty" style="display:none;">✓ Everything is in sync — nothing to repair.</div>
    <div id="list"></div>
    <div class="footer">
      <span id="status" class="status"></span>
      <button id="apply-btn" class="primary" onclick="ReconcileDialog.apply()" disabled="disabled">Apply selected fixes</button>
      <button id="close-btn" onclick="ReconcileDialog.close()">Close</button>
    </div>
  </div>
</body>
</html>
