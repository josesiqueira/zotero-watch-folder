<vbox id="watch-folder-preferences"
      xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml"
      style="overflow: auto;"
      onload="if (typeof WatchFolderPrefs !== 'undefined' &amp;&amp; WatchFolderPrefs.onLoad) WatchFolderPrefs.onLoad()">

  <!-- About Section -->
  <groupbox>
    <label><html:h2 data-l10n-id="watch-folder-pref-section-about"/></label>
    <vbox style="margin: 4px 8px;">
      <html:p data-l10n-id="watch-folder-pref-about-text" style="margin: 4px 0; line-height: 1.4;"/>
      <html:p data-l10n-id="watch-folder-pref-about-storage" style="margin: 4px 0; line-height: 1.4;"/>
      <html:p data-l10n-id="watch-folder-pref-about-trash" style="margin: 4px 0; line-height: 1.4;"/>
    </vbox>
  </groupbox>

  <!-- Watch Folder Section -->
  <groupbox>
    <label><html:h2 data-l10n-id="watch-folder-pref-section-watch"/></label>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-enabled" control="watch-folder-enabled"/>
      <checkbox id="watch-folder-enabled"
                preference="extensions.zotero.watchFolder.enabled"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-source-path" control="watch-folder-source-path"/>
      <html:input id="watch-folder-source-path" type="text" style="flex: 1;"
                  preference="extensions.zotero.watchFolder.sourcePath"
                  readonly="true"/>
      <button id="watch-folder-browse-btn" data-l10n-id="watch-folder-pref-browse"
              oncommand="WatchFolderPrefs.browseForFolder()"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-poll-interval" control="watch-folder-poll-interval"/>
      <html:input id="watch-folder-poll-interval" type="number" min="1" max="60"
                  preference="extensions.zotero.watchFolder.pollInterval"
                  style="width: 60px;"/>
      <label data-l10n-id="watch-folder-pref-poll-interval-suffix"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-file-types" control="watch-folder-file-types"/>
      <html:input id="watch-folder-file-types" type="text"
                  preference="extensions.zotero.watchFolder.fileTypes"
                  style="width: 200px;"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-target-collection" control="watch-folder-target-collection"/>
      <html:input id="watch-folder-target-collection" type="text"
                  preference="extensions.zotero.watchFolder.targetCollection"
                  style="width: 200px;"/>
    </hbox>
  </groupbox>

  <!-- Import Mode / Post-Import Action removed from the visible UI.
       They remain functional preferences (extensions.zotero.watchFolder.importMode,
       extensions.zotero.watchFolder.postImportAction). Defaults — stored + leave —
       suit nearly every workflow. Change via about:config if you need to. -->

  <!-- File Naming Section -->
  <groupbox>
    <label><html:h2 data-l10n-id="watch-folder-pref-section-naming"/></label>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-auto-rename" control="watch-folder-auto-rename"/>
      <checkbox id="watch-folder-auto-rename"
                preference="extensions.zotero.watchFolder.autoRename"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-rename-pattern" control="watch-folder-rename-pattern"/>
      <html:input id="watch-folder-rename-pattern" type="text"
                  preference="extensions.zotero.watchFolder.renamePattern"
                  style="flex: 1;"/>
    </hbox>

    <vbox>
      <label data-l10n-id="watch-folder-pref-rename-pattern-help" style="font-size: 0.9em; color: gray;"/>
    </vbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-max-filename" control="watch-folder-max-filename"/>
      <html:input id="watch-folder-max-filename" type="number" min="50" max="255"
                  preference="extensions.zotero.watchFolder.maxFilenameLength"
                  style="width: 80px;"/>
      <label data-l10n-id="watch-folder-pref-max-filename-suffix"/>
    </hbox>
  </groupbox>

</vbox>
