<vbox id="watch-folder-preferences"
      xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml"
      style="overflow: auto;"
      onload="if (typeof WatchFolderPrefs !== 'undefined' &amp;&amp; WatchFolderPrefs.onLoad) WatchFolderPrefs.onLoad()">

  <!-- About Section -->
  <groupbox>
    <label><html:h2 data-l10n-id="watch-folder-pref-section-about"/></label>
    <vbox style="margin: 4px 8px;">
      <html:p data-l10n-id="watch-folder-pref-about-text" style="margin: 4px 0; line-height: 1.4;"/>
      <html:p data-l10n-id="watch-folder-pref-about-storage" style="margin: 4px 0; line-height: 1.4;"/>
      <html:p data-l10n-id="watch-folder-pref-about-trash" style="margin: 4px 0; line-height: 1.4;"/>
    </vbox>
  </groupbox>

  <!-- Watch Folder Section -->
  <groupbox>
    <label><html:h2 data-l10n-id="watch-folder-pref-section-watch"/></label>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-enabled" control="watch-folder-enabled"/>
      <checkbox id="watch-folder-enabled"
                preference="extensions.zotero.watchFolder.enabled"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-source-path" control="watch-folder-source-path"/>
      <html:input id="watch-folder-source-path" type="text" style="flex: 1;"
                  preference="extensions.zotero.watchFolder.sourcePath"
                  readonly="true"/>
      <button id="watch-folder-browse-btn" data-l10n-id="watch-folder-pref-browse"
              oncommand="WatchFolderPrefs.browseForFolder()"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-poll-interval" control="watch-folder-poll-interval"/>
      <html:input id="watch-folder-poll-interval" type="number" min="1" max="60"
                  preference="extensions.zotero.watchFolder.pollInterval"
                  style="width: 60px;"/>
      <label data-l10n-id="watch-folder-pref-poll-interval-suffix"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-file-types" control="watch-folder-file-types"/>
      <html:input id="watch-folder-file-types" type="text"
                  preference="extensions.zotero.watchFolder.fileTypes"
                  style="width: 200px;"/>
    </hbox>

    <!-- Sync root collection (v2 — replaces the v1 targetCollection name).
         Files from the watch folder land in this Zotero collection. The
         button opens a picker over the user library's collections. -->
    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-sync-root" control="watch-folder-sync-root-display"/>
      <html:input id="watch-folder-sync-root-display" type="text" style="flex: 1;" readonly="true"/>
      <button id="watch-folder-sync-root-btn" data-l10n-id="watch-folder-pref-sync-root-change"
              oncommand="WatchFolderPrefs.pickSyncRoot()"/>
    </hbox>

    <!-- Sync mode display. v2.1 ships Mode 1 + Mode 2 (functional); Mode 3
         is reserved for v2.2 (safe-delete). The wizard surfaces only the
         working modes. -->
    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-mode" control="watch-folder-mode-display"/>
      <html:input id="watch-folder-mode-display" type="text" style="width: 280px;" readonly="true"/>
    </hbox>

    <!-- Re-run setup wizard. Useful after the user changes their library
         organization or wants to switch modes from scratch. -->
    <hbox align="center">
      <button id="watch-folder-rerun-wizard-btn" data-l10n-id="watch-folder-pref-rerun-wizard"
              oncommand="WatchFolderPrefs.runSetupWizard()"/>
    </hbox>

    <!-- Sync warnings — Phase D. Populated from Zotero.WatchFolder.warningSink.
         Shows running count + a View button that opens an alert with the
         recent entries. Hidden when count is 0. -->
    <hbox id="watch-folder-warnings-row" align="center" hidden="true">
      <label data-l10n-id="watch-folder-pref-warnings" control="watch-folder-warnings-count"/>
      <html:input id="watch-folder-warnings-count" type="text" style="width: 60px;" readonly="true"/>
      <button id="watch-folder-warnings-view-btn" data-l10n-id="watch-folder-pref-warnings-view"
              oncommand="WatchFolderPrefs.viewWarnings()"/>
      <button id="watch-folder-warnings-clear-btn" data-l10n-id="watch-folder-pref-warnings-clear"
              oncommand="WatchFolderPrefs.clearWarnings()"/>
    </hbox>

    <!-- Suppressed items — Phase B. Items whose last sync-root membership
         was removed in Zotero; the local file is preserved until the user
         picks a resolution (Re-add / Keep local / Trash / Move outside). -->
    <hbox id="watch-folder-suppressed-row" align="center" hidden="true">
      <label data-l10n-id="watch-folder-pref-suppressed" control="watch-folder-suppressed-count"/>
      <html:input id="watch-folder-suppressed-count" type="text" style="width: 160px;" readonly="true"/>
      <button id="watch-folder-suppressed-resolve-btn" data-l10n-id="watch-folder-pref-suppressed-resolve"
              oncommand="WatchFolderPrefs.resolveSuppressed()"/>
      <button id="watch-folder-suppressed-resolve-folders-btn" data-l10n-id="watch-folder-pref-suppressed-resolve-folders"
              hidden="true"
              oncommand="WatchFolderPrefs.resolveSuppressedFolders()"/>
    </hbox>

    <!-- Conflict-blocked items — Phase D adjunct. Files whose conflict
         gate refused a move/delete because of local hash drift. The
         Resolve… button opens the 3-action picker (re-stamp baseline /
         discard local / pause sync) per record. -->
    <hbox id="watch-folder-conflicted-row" align="center" hidden="true">
      <label data-l10n-id="watch-folder-pref-conflicted" control="watch-folder-conflicted-count"/>
      <html:input id="watch-folder-conflicted-count" type="text" style="width: 60px;" readonly="true"/>
      <button id="watch-folder-conflicted-resolve-btn" data-l10n-id="watch-folder-pref-conflicted-resolve"
              oncommand="WatchFolderPrefs.resolveConflicts()"/>
    </hbox>

    <!-- Trashed folders — v2.2 Mode 3. mirrorExecutor.deleteFolder
         moves deleted folders into .zotero-watch-trash/; the user can
         restore them back into the sync root + re-create the Zotero
         collection. Hidden when none. -->
    <hbox id="watch-folder-trashed-folders-row" align="center" hidden="true">
      <label data-l10n-id="watch-folder-pref-trashed-folders" control="watch-folder-trashed-folders-count"/>
      <html:input id="watch-folder-trashed-folders-count" type="text" style="width: 60px;" readonly="true"/>
      <button id="watch-folder-trashed-folders-restore-btn"
              data-l10n-id="watch-folder-pref-trashed-folders-restore"
              oncommand="WatchFolderPrefs.restoreTrashedFolders()"/>
    </hbox>
  </groupbox>

  <!-- Import Mode / Post-Import Action removed from the visible UI.
       They remain functional preferences (extensions.zotero.watchFolder.importMode,
       extensions.zotero.watchFolder.postImportAction). Defaults — stored + leave —
       suit nearly every workflow. Change via about:config if you need to. -->

  <!-- File Naming Section -->
  <groupbox>
    <label><html:h2 data-l10n-id="watch-folder-pref-section-naming"/></label>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-auto-rename" control="watch-folder-auto-rename"/>
      <checkbox id="watch-folder-auto-rename"
                preference="extensions.zotero.watchFolder.autoRename"/>
    </hbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-rename-pattern" control="watch-folder-rename-pattern"/>
      <html:input id="watch-folder-rename-pattern" type="text"
                  preference="extensions.zotero.watchFolder.renamePattern"
                  style="flex: 1;"/>
    </hbox>

    <vbox>
      <label data-l10n-id="watch-folder-pref-rename-pattern-help" style="font-size: 0.9em; color: gray;"/>
    </vbox>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-max-filename" control="watch-folder-max-filename"/>
      <html:input id="watch-folder-max-filename" type="number" min="50" max="255"
                  preference="extensions.zotero.watchFolder.maxFilenameLength"
                  style="width: 80px;"/>
      <label data-l10n-id="watch-folder-pref-max-filename-suffix"/>
    </hbox>
  </groupbox>

  <!-- Smart Rules Section. The engine in content/smartRules.mjs reads the
       JSON from `extensions.zotero.watchFolder.smartRules` and evaluates
       each rule's conditions/actions against newly-imported items. The
       textarea below edits that JSON directly (manual save — NOT bound
       to the pref, so users don't save broken JSON on every keystroke). -->
  <groupbox>
    <label><html:h2 data-l10n-id="watch-folder-pref-section-smart-rules"/></label>

    <hbox align="center">
      <label data-l10n-id="watch-folder-pref-smart-rules-enabled" control="watch-folder-smart-rules-enabled"/>
      <checkbox id="watch-folder-smart-rules-enabled"
                preference="extensions.zotero.watchFolder.smartRulesEnabled"/>
    </hbox>

    <vbox style="margin: 4px 0;">
      <label data-l10n-id="watch-folder-pref-smart-rules-help" style="font-size: 0.9em; color: gray;"/>
    </vbox>

    <html:textarea id="watch-folder-smart-rules-editor"
                   rows="12"
                   style="width: 100%; font-family: monospace; font-size: 0.9em;"
                   spellcheck="false"/>

    <hbox align="center" style="margin-top: 4px;">
      <button id="watch-folder-smart-rules-save-btn"
              data-l10n-id="watch-folder-pref-smart-rules-save"
              oncommand="WatchFolderPrefs.saveSmartRules()"/>
      <button id="watch-folder-smart-rules-insert-btn"
              data-l10n-id="watch-folder-pref-smart-rules-insert-example"
              oncommand="WatchFolderPrefs.insertSmartRuleExample()"/>
      <button id="watch-folder-smart-rules-reload-btn"
              data-l10n-id="watch-folder-pref-smart-rules-reload"
              oncommand="WatchFolderPrefs.reloadSmartRules()"/>
    </hbox>
  </groupbox>

</vbox>
